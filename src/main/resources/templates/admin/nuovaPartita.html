<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuova partita</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>Registrazione nuova partita</h1>

<form th:action="@{/admin/torneo/{id}/partita/nuova(id=${modelTorneo.id})}"
      th:object="${modelNuovaPartita}"
      method="post">

    <div>
        <label>Inserisci giornata:</label>
        <input type="number" th:field="*{giornata}" min="1">
    </div>

    <br>

    <div>
        <label>Torneo:</label>
        <span th:text="${modelTorneo.nome}"></span>
    </div>

    <br>

    <div>
        <label>Inserisci data e ora partita:</label>
        <input type="datetime-local" th:field="*{dataOraPartita}">
    </div>

    <br>

    <div>
        <label>Inserisci luogo:</label>
        <input type="text" th:field="*{luogo}">
    </div>

    <br>

    <div>
        <label>Seleziona arbitro:</label>
        <select name="arbitroId">
            <option th:each="arbitro : ${modelArbitri}"
                    th:value="${arbitro.id}"
                    th:text="${arbitro.nome + ' ' + arbitro.cognome}">
            </option>
        </select>
    </div>

    <br>

    <div>
        <label>Stato partita:</label>
        <select th:field="*{statoPartita}">
            <option value="SCHEDULED">SCHEDULED</option>
            <option value="PLAYED">PLAYED</option>
        </select>
    </div>

    <br>

    <div>
        <label>Seleziona squadra casa:</label>
        <select name="squadraCasaId">
            <option th:each="squadra : ${modelSquadre}"
                    th:value="${squadra.id}"
                    th:text="${squadra.nome}">
            </option>
        </select>
    </div>

    <br>

    <div>
        <label>Seleziona squadra ospite:</label>
        <select name="squadraOspiteId">
            <option th:each="squadra : ${modelSquadre}"
                    th:value="${squadra.id}"
                    th:text="${squadra.nome}">
            </option>
        </select>
    </div>

    <br>

    <div>
        <label>Goal squadra casa:</label>
        <input type="number" th:field="*{goalsHome}">
    </div>

    <br>

    <div>
        <label>Goal squadra ospite:</label>
        <input type="number" th:field="*{goalsAway}">
    </div>

    <br>

    <button type="submit">Aggiungi partita</button>

</form>

<br>

<a th:href="@{/listaTornei/{id}(id=${modelTorneo.id})}">Torna al dettaglio torneo</a>

<br><br>

<a th:href="@{/home}">Torna alla home</a>

</body>
</html>

<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Lista partite</title>
</head>
<body>

<h1>Partite registrate nel sistema: </h1>

<table border="1">
    <thead>
    <tr>
        <th>Giornata</th>
        <th>Torneo</th>
        <th>Data e ora</th>
        <th>Luogo</th>
        <th>Arbitro</th>
        <th>Stato</th>
        <th>Squadra casa</th>
        <th>Squadra ospite</th>
        <th>Goal casa</th>
        <th>Goal ospite</th>
        <th>Dettaglio</th>
        <th sec:authorize="hasAuthority('ADMIN')">Risultato</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="partita : ${modelPartite}">
        <td th:text="${partita.giornata}"></td>

        <td>
            <a th:href="@{/listaTornei/{id}(id=${partita.torneo.id})}"
               th:text="${partita.torneo.nome}">
            </a>
        </td>

        <td th:text="${partita.dataOraPartita}"></td>

        <td th:text="${partita.luogo}"></td>

        <td th:text="${partita.arbitro != null ? partita.arbitro.nome + ' ' + partita.arbitro.cognome : 'Nessun arbitro'}"></td>

        <td th:text="${partita.statoPartita}"></td>

        <td>
            <a th:href="@{/squadra/{id}(id=${partita.squadraCasa.id})}"
               th:text="${partita.squadraCasa.nome}">
            </a>
        </td>

        <td>
            <a th:href="@{/squadra/{id}(id=${partita.squadraOspite.id})}"
               th:text="${partita.squadraOspite.nome}">
            </a>
        </td>

        <td th:text="${partita.goalsHome}"></td>
        <td th:text="${partita.goalsAway}"></td>

        <td>
            <a th:href="@{/partita/{id}(id=${partita.id})}">Vai al dettaglio</a>
        </td>

        <td sec:authorize="hasAuthority('ADMIN')">
            <a th:href="@{/admin/partita/{id}/risultato(id=${partita.id})}">
                Inserisci/modifica risultato
            </a>
        </td>
    </tr>
    </tbody>
</table>
<br><br>
<div sec:authorize="hasAuthority('ADMIN')">
    <a th:href="@{/listaTornei}">Vai ai tornei per inserire una nuova partita</a>
    <br><br>
</div>

<a th:href="@{/home}">Torna alla home</a>

</body>
</html>
